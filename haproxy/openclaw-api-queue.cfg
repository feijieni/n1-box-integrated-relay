global
  maxconn 128
  log /dev/log local0

defaults
  mode http
  log global
  option httplog
  option http-server-close
  timeout connect 10s
  timeout client 10m
  timeout server 10m
  timeout queue 30m
  timeout http-request 30s
  timeout http-keep-alive 30s
  timeout tunnel 10m

frontend openclaw_api_queue
  bind 0.0.0.0:3002
  acl models_path path -i /v1/models
  acl chat_path path -i /v1/chat/completions
  acl responses_path path -i /v1/responses
  acl tools_path path -i /tools/invoke
  acl allowed_path path_beg /v1/chat/completions /v1/models /v1/responses /tools/invoke
  http-request deny deny_status 403 unless allowed_path
  http-request set-header x-openclaw-scopes operator.read if models_path
  http-request set-header x-openclaw-scopes operator.write if chat_path || responses_path || tools_path
  default_backend openclaw_gateway

backend openclaw_gateway
  balance roundrobin
  server openclaw1 127.0.0.1:3001 maxconn 1 check
