name: Repository checks

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  repository-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run publish safety checks
        run: bash scripts/check-publish-safety.sh

      - name: Run repository health checks
        run: bash scripts/check-repo-health.sh

      - name: Run non-destructive doctor
        run: bash scripts/doctor.sh
