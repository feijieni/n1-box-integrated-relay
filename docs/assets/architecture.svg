<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="640" viewBox="0 0 1180 640" role="img" aria-labelledby="title desc">
  <title id="title">Linux Device AI Relay architecture</title>
  <desc id="desc">A diagram showing client devices, LAN or public access, HAProxy queueing, CLIProxyAPI, OpenClaw Zero Token, Chrome browser service, systemd supervision, and local runtime state on a small Linux device or server.</desc>
  <defs>
    <style>
      .bg { fill: #f7f8fa; }
      .panel { fill: #ffffff; stroke: #d9dee7; stroke-width: 2; rx: 18; }
      .box { fill: #ffffff; stroke: #9aa8ba; stroke-width: 2; rx: 14; }
      .box2 { fill: #eef5ff; stroke: #6d93c5; stroke-width: 2; rx: 14; }
      .box3 { fill: #eefaf1; stroke: #65a873; stroke-width: 2; rx: 14; }
      .warn { fill: #fff6e5; stroke: #d49a2a; stroke-width: 2; rx: 14; }
      .title { font: 700 28px Arial, sans-serif; fill: #1f2937; }
      .h { font: 700 17px Arial, sans-serif; fill: #1f2937; }
      .t { font: 14px Arial, sans-serif; fill: #374151; }
      .s { font: 12px Arial, sans-serif; fill: #5b6675; }
      .line { stroke: #637083; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .line2 { stroke: #3d7a4b; stroke-width: 2.4; fill: none; marker-end: url(#arrowGreen); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#637083"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#3d7a4b"/>
    </marker>
  </defs>
  <rect class="bg" width="1180" height="640"/>
  <text x="40" y="54" class="title">Linux Device AI Relay</text>
  <text x="40" y="82" class="t">Raspberry Pi, TV box, mini PC, home server, or VPS becomes a managed AI relay host.</text>

  <rect x="40" y="120" width="210" height="360" class="panel"/>
  <text x="68" y="155" class="h">Clients</text>
  <rect x="70" y="185" width="150" height="62" class="box"/>
  <text x="92" y="212" class="t">LAN devices</text>
  <text x="88" y="233" class="s">laptop / phone / tools</text>
  <rect x="70" y="276" width="150" height="62" class="box"/>
  <text x="94" y="303" class="t">Public host</text>
  <text x="86" y="324" class="s">optional reverse proxy</text>
  <rect x="70" y="367" width="150" height="62" class="box"/>
  <text x="92" y="394" class="t">Agent tools</text>
  <text x="90" y="415" class="s">OpenClaw-style calls</text>

  <rect x="315" y="120" width="565" height="420" class="panel"/>
  <text x="344" y="155" class="h">Linux relay host</text>
  <text x="344" y="177" class="s">Ubuntu / Debian / Armbian / similar systemd-based Linux</text>

  <rect x="350" y="205" width="210" height="80" class="box2"/>
  <text x="380" y="235" class="h">CLIProxyAPI</text>
  <text x="377" y="259" class="s">API proxy and provider compatibility</text>

  <rect x="625" y="205" width="210" height="80" class="box2"/>
  <text x="653" y="235" class="h">OpenClaw service</text>
  <text x="650" y="259" class="s">runtime, tools, channels, control UI</text>

  <rect x="625" y="325" width="210" height="80" class="box3"/>
  <text x="653" y="355" class="h">HAProxy queue</text>
  <text x="650" y="379" class="s">serialized API path for smaller hosts</text>

  <rect x="350" y="325" width="210" height="80" class="box3"/>
  <text x="379" y="355" class="h">Chrome service</text>
  <text x="377" y="379" class="s">browser login and attach-only models</text>

  <rect x="486" y="450" width="210" height="60" class="warn"/>
  <text x="518" y="475" class="h">systemd supervision</text>
  <text x="516" y="496" class="s">boot start, restart, health checks</text>

  <rect x="935" y="120" width="205" height="360" class="panel"/>
  <text x="964" y="155" class="h">Local runtime state</text>
  <rect x="965" y="185" width="145" height="64" class="warn"/>
  <text x="994" y="211" class="t">ACCESS.txt</text>
  <text x="990" y="232" class="s">generated locally</text>
  <rect x="965" y="275" width="145" height="64" class="warn"/>
  <text x="1006" y="301" class="t">cookies</text>
  <text x="988" y="322" class="s">not committed</text>
  <rect x="965" y="365" width="145" height="64" class="warn"/>
  <text x="992" y="391" class="t">config.yaml</text>
  <text x="986" y="412" class="s">machine-specific</text>

  <path d="M250 216 C285 216 305 216 345 231" class="line"/>
  <path d="M250 307 C310 307 345 260 350 255" class="line"/>
  <path d="M250 398 C330 398 570 380 625 370" class="line"/>
  <path d="M560 245 C590 245 600 245 625 245" class="line"/>
  <path d="M730 285 L730 325" class="line"/>
  <path d="M625 365 C600 365 585 365 560 365" class="line2"/>
  <path d="M835 245 C880 245 920 216 965 216" class="line"/>
  <path d="M835 365 C900 365 925 307 965 307" class="line"/>
  <path d="M560 365 C790 425 840 398 965 398" class="line"/>

  <text x="318" y="590" class="s">Public repository contains source, templates, docs, checks, and deployment logic. Target host contains generated secrets and runtime state.</text>
</svg>
